services:

  # ── Service 1: MySQL Database ───────────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Service 2: Flask Application ────────────────────────────────────────────
  flask:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: student-result-flask:latest
    container_name: flask_app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_DEBUG: ${FLASK_DEBUG}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "5000:5000"
    volumes:
      - app_logs:/app/logs
    networks:
      - backend_network
      - frontend_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Service 3: Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend_network
    depends_on:
      - flask
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  backend_network:
    driver: bridge
    name: student_backend
  frontend_network:
    driver: bridge
    name: student_frontend

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    name: student_mysql_data
  app_logs:
    name: student_app_logs
  nginx_logs:
    name: student_nginx_logs
